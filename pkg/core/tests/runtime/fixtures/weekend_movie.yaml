channel: retro_movies
broadcast_day: "1989-10-14"
timezone: America/New_York
template: premium_movie

pools:
  blockbusters:
    match:
      type: movie
      collection: col.movies.blockbusters_70s_90s
  family_adventure:
    match:
      type: movie
      collection: col.movies.family_adventure
  late_night:
    match:
      type: movie
      collection: col.movies.late_night_thrillers

programs:
  primetime_movie:
    pool: blockbusters
    grid_blocks: 4
    fill_mode: single
  late_movie:
    pool: late_night
    grid_blocks: 4
    fill_mode: single

schedule:
  saturday:
    - start: "20:00"
      slots: 4
      program: primetime_movie
      progression: random
      bleed: true
    - start: "22:00"
      slots: 4
      program: late_movie
      progression: random
      bleed: true
