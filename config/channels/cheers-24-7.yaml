channel: cheers-24-7
channel_number: 2
name: "Cheers 24/7"
channel_type: network
timezone: America/New_York

format:
  video: { width: 968, height: 720, frame_rate: "30000/1001" }
  audio: { sample_rate: 48000, channels: 2 }
  grid_minutes: 30

# -----------------------------
# CONTENT POOLS
# -----------------------------

pools:
  cheers:
    match:
      type: episode
      series_title: Cheers

# -----------------------------
# PROGRAM DEFINITIONS
# -----------------------------

programs:

  cheers_30:
    pool: cheers
    grid_blocks: 1
    fill_mode: single

# -----------------------------
# TRAFFIC CONFIG
# -----------------------------

traffic:

  break_config:
    to_break_bumper_ms: 3000
    from_break_bumper_ms: 3000
    station_id_ms: 5000

  default_profile: sitcom_standard

  inventories:

    commercials:
      match:
        type: commercial
      asset_type: commercial

    promos:
      match:
        type: promo
      asset_type: promo

    trailers:
      match:
        type: trailer
      asset_type: trailer

    bumpers:
      match:
        type: bumper
      asset_type: bumper

    station_ids:
      match:
        type: station_id
      asset_type: station_id

  # ---------------------------
  # TRAFFIC PROFILES
  # ---------------------------

  profiles:

    sitcom_standard:

      allowed_types:
        - commercial
        - promo
        - trailer

      default_cooldown_seconds: 3600

      type_cooldowns_seconds:
        trailer: 7200

      max_plays_per_day: 0

# -----------------------------
# SCHEDULE
# -----------------------------

schedule:

  all_day:
    - start: "06:00"
      slots: 48
      program: cheers_30
      progression: sequential