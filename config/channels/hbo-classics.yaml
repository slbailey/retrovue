channel: hbo-classics
channel_number: 6
name: "HBO"
channel_type: movie
timezone: America/New_York

format:
  video: { width: 1280, height: 720, frame_rate: "30000/1001" }
  audio: { sample_rate: 48000, channels: 2 }
  grid_minutes: 30

filler: !include _defaults.yaml:filler

notes:
  vibe: "Premium movies all day, every day"
  tagline: "It's Not TV. It's HBO."

pools:
  hbo_movies:
    match:
      type: movie
    max_duration_sec: 10800

templates:
  hbo_feature_with_intro:
    segments:
      - source:
          type: collection
          name: Intros
        selection:
          - type: tags
            values: [hbo]
        mode: random
      - source:
          type: pool
          name: hbo_movies
        mode: random
        primary: true

schedule:
  all_day:
    - type: template
      name: hbo_feature_with_intro
      start: "06:00"
      end: "14:00"
      allow_bleed: true
    - type: template
      name: hbo_feature_with_intro
      start: "14:00"
      end: "22:00"
      allow_bleed: true
    - type: template
      name: hbo_feature_with_intro
      start: "22:00"
      end: "06:00"
      allow_bleed: true

traffic:
  allowed_types: [promo]
  default_cooldown_seconds: 7200
  max_plays_per_day: 3
